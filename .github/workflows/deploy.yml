name: Build Project 5

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: corretto
        java-version: '21'

    - name: Build WAR
      run: mvn package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: project5-war
        path: target/*.war
